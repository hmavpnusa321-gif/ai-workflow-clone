<script>
async function runWorkflow() {
    const prompt = document.querySelector('textarea').value;
    const resultBox = document.getElementById('resultBox');
    
    if(!prompt) return alert("Pehle kuch likho toh sahi!");

    resultBox.innerHTML = "🌀 AI is thinking... Generating your image/video";
    
    // Yahan hum API ko call karenge (Example: Together AI or Replicate)
    // Aapko apni API KEY yahan lagani hogi
    try {
        const response = await fetch("https://api.together.xyz/v1/images/generations", {
            method: "POST",
            headers: {
                "Authorization": "Bearer YOUR_API_KEY_HERE",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt,
                model: "black-forest-labs/FLUX.1-schnell",
                width: 1024,
                height: 768
            })
        });

        const data = await response.json();
        const imageUrl = data.data[0].url;
        
        resultBox.innerHTML = `<img src="${imageUrl}" class="rounded-lg shadow-lg" alt="AI Result">`;
    } catch (error) {
        resultBox.innerHTML = "❌ Error: API Key check karein.";
    }
}
</script>
